<head>

<style>:root {
  --bg: #ffffff;
  --bg-2: #f6f8fa;
  --bg-3: #eef1f4;
  --fg: #1f2328;
  --fg-dim: #57606a;
  --fg-mute: #8b949e;
  --link: #0969da;
  --border: #d0d7de;
  --border-soft: #e5e9ee;
  --code-bg: #f6f8fa;
  --code-fg: #24292f;
  --accent: #0969da;
  --warn-bg: #fff8c5;
  --warn-border: #d4a72c;
  --danger-bg: #ffebe9;
  --danger-border: #ff8182;
  --tip-bg: #ddf4ff;
  --tip-border: #54aeff;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  --sidebar-w: 260px;
}
[data-theme="dark"] {
  --bg: #0d1117;
  --bg-2: #161b22;
  --bg-3: #1c2128;
  --fg: #e6edf3;
  --fg-dim: #9198a1;
  --fg-mute: #6e7681;
  --link: #4493f8;
  --border: #30363d;
  --border-soft: #21262d;
  --code-bg: #161b22;
  --code-fg: #e6edf3;
  --accent: #4493f8;
  --warn-bg: #3d2c00;
  --warn-border: #9e6a03;
  --danger-bg: #3c1519;
  --danger-border: #ff8182;
  --tip-bg: #0c2d6b;
  --tip-border: #4493f8;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}
a { color: var(--link); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ===== Layout ===== */
.doc {
  display: grid;
  grid-template-columns: var(--sidebar-w) minmax(0, 1fr);
  min-height: 100vh;
}
.sidebar {
  border-right: 1px solid var(--border-soft);
  background: var(--bg-2);
  padding: 20px 18px;
  position: sticky;
  top: 0;
  align-self: start;
  height: 100vh;
  overflow-y: auto;
  font-size: 13.5px;
}
.sidebar h2 {
  font-size: 13px;
  color: var(--fg-mute);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin: 16px 0 6px;
  padding: 0 8px;
  font-weight: 600;
}
.sidebar h2:first-child { margin-top: 0; }
.sidebar .brand {
  font-weight: 700;
  font-size: 15px;
  color: var(--fg);
  padding: 0 8px 12px;
  border-bottom: 1px solid var(--border-soft);
  margin-bottom: 12px;
}
.sidebar .brand small {
  display: block;
  font-weight: 400;
  color: var(--fg-mute);
  font-size: 12px;
  margin-top: 3px;
}
.sidebar ul { list-style: none; padding: 0; margin: 0; }
.sidebar li a {
  display: block;
  padding: 5px 8px;
  color: var(--fg-dim);
  border-radius: 4px;
  border-left: 2px solid transparent;
  line-height: 1.5;
}
.sidebar li a:hover { background: var(--bg-3); color: var(--fg); text-decoration: none; }
.sidebar li a.active {
  color: var(--link);
  background: var(--bg-3);
  border-left-color: var(--link);
  font-weight: 600;
}
.sidebar li.sub a { padding-left: 22px; font-size: 12.5px; }
.sidebar .tools {
  margin-top: 20px;
  padding: 10px 8px;
  border-top: 1px solid var(--border-soft);
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.sidebar .tools button, .sidebar .tools a {
  background: var(--bg);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 12px;
  cursor: pointer;
  font-family: var(--sans);
}
.sidebar .tools button:hover, .sidebar .tools a:hover { border-color: var(--link); color: var(--link); }

.content {
  padding: 32px 48px 80px;
  max-width: 900px;
  min-width: 0;
}

/* mobile toggle */
.menu-btn {
  display: none;
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 100;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  cursor: pointer;
  font-family: var(--sans);
}

/* ===== Typography ===== */
.doc-title {
  font-size: 28px;
  font-weight: 700;
  margin: 0 0 4px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-soft);
}
.doc-lede {
  color: var(--fg-dim);
  font-size: 15px;
  margin: 0 0 32px;
}

.theme-block {
  padding-top: 24px;
  margin-bottom: 24px;
  scroll-margin-top: 20px;
}
.theme-block + .theme-block {
  border-top: 1px solid var(--border-soft);
  padding-top: 32px;
}
h2.theme-title {
  font-size: 24px;
  font-weight: 700;
  margin: 0 0 6px;
  scroll-margin-top: 20px;
}
.tagline {
  color: var(--fg-dim);
  font-size: 13.5px;
  margin: 0 0 20px;
  font-style: italic;
}

h3.stage {
  font-size: 18px;
  font-weight: 600;
  margin: 28px 0 10px;
  color: var(--fg);
  scroll-margin-top: 20px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border-soft);
}
h3.stage[data-stage="what-is"]::before     { content: '① '; color: var(--fg-mute); font-weight: 400; }
h3.stage[data-stage="why-choose"]::before  { content: '② '; color: var(--fg-mute); font-weight: 400; }
h3.stage[data-stage="what-broke"]::before  { content: '③ '; color: var(--fg-mute); font-weight: 400; }
h3.stage[data-stage="how-fixed"]::before   { content: '④ '; color: var(--fg-mute); font-weight: 400; }
h3.stage[data-stage="hero"]::before        { content: '☆ '; color: var(--fg-mute); font-weight: 400; }
h3.stage[data-stage="sources"]::before     { content: '📎 '; }

h4 {
  font-size: 15px;
  font-weight: 600;
  margin: 20px 0 8px;
  color: var(--fg);
}

p { margin: 8px 0 12px; }
ul, ol { padding-left: 24px; margin: 8px 0 14px; }
li { margin: 3px 0; }
li > p { margin: 4px 0; }
strong { font-weight: 600; }
em {
  font-style: normal;
  background: var(--warn-bg);
  padding: 0 3px;
  border-radius: 3px;
  font-weight: 500;
}

/* code */
code {
  font-family: var(--mono);
  background: var(--code-bg);
  border: 1px solid var(--border-soft);
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 87%;
  color: var(--code-fg);
}
pre {
  background: var(--code-bg);
  border: 1px solid var(--border-soft);
  border-radius: 6px;
  padding: 12px 14px;
  overflow-x: auto;
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.55;
  margin: 12px 0;
}
pre code { background: none; border: none; padding: 0; color: var(--fg); font-size: 100%; }

/* table */
table {
  border-collapse: collapse;
  width: 100%;
  margin: 12px 0 18px;
  font-size: 13.5px;
  display: block;
  overflow-x: auto;
}
th, td {
  border: 1px solid var(--border);
  padding: 8px 12px;
  text-align: left;
  vertical-align: top;
}
th { background: var(--bg-2); font-weight: 600; }
tr:nth-child(even) td { background: var(--bg-2); }

/* blockquote */
blockquote {
  border-left: 3px solid var(--border);
  margin: 12px 0;
  padding: 4px 14px;
  color: var(--fg-dim);
  background: var(--bg-2);
  font-size: 14px;
}

/* callout */
.callout {
  border: 1px solid var(--border-soft);
  border-left: 3px solid var(--link);
  border-radius: 6px;
  padding: 10px 14px;
  margin: 14px 0;
  background: var(--tip-bg);
  font-size: 14px;
}
.callout.warn   { background: var(--warn-bg); border-left-color: var(--warn-border); }
.callout.danger { background: var(--danger-bg); border-left-color: var(--danger-border); }
.callout.tip    { background: var(--tip-bg); border-left-color: var(--tip-border); }
.callout .title { font-weight: 600; margin-bottom: 4px; }

/* kv */
.kv {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 6px 14px;
  margin: 8px 0 14px;
  font-size: 14px;
}
.kv .k { color: var(--fg-dim); font-weight: 600; }

/* ascii art */
.ascii {
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.5;
  background: var(--code-bg);
  border: 1px solid var(--border-soft);
  padding: 12px 14px;
  border-radius: 6px;
  white-space: pre;
  overflow-x: auto;
  margin: 12px 0;
}

hr { border: none; border-top: 1px solid var(--border-soft); margin: 24px 0; }

.footer-note {
  margin-top: 40px;
  padding-top: 16px;
  border-top: 1px solid var(--border-soft);
  color: var(--fg-mute);
  font-size: 12px;
  line-height: 1.6;
}

/* Anchor links on headings */
h2.theme-title, h3.stage {
  position: relative;
}
h2.theme-title:hover .anchor,
h3.stage:hover .anchor { opacity: 1; }
.anchor {
  position: absolute;
  left: -18px;
  top: 0;
  color: var(--fg-mute);
  opacity: 0;
  text-decoration: none;
  padding: 0 4px;
  font-weight: 400;
}
.anchor:hover { color: var(--link); text-decoration: none; }

/* ===== Responsive ===== */
@media (max-width: 900px) {
  .doc { grid-template-columns: 1fr; }
  .menu-btn { display: block; }
  .sidebar {
    position: fixed;
    top: 0; left: 0;
    width: 280px;
    height: 100vh;
    z-index: 90;
    transform: translateX(-100%);
    transition: transform 0.2s;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
  }
  .sidebar.open { transform: translateX(0); }
  .content { padding: 56px 20px 60px; }
  .doc-title { font-size: 22px; }
  h2.theme-title { font-size: 20px; }
  h3.stage { font-size: 16px; }
}

@media (max-width: 500px) {
  body { font-size: 14.5px; }
  .content { padding: 56px 16px 60px; }
  .kv { grid-template-columns: 1fr; gap: 2px 0; }
  .kv .k { margin-top: 8px; }
}

/* ===== Print ===== */
@media print {
  body { background: white; color: black; font-size: 11pt; line-height: 1.55; }
  .sidebar, .menu-btn, .tools { display: none !important; }
  .doc { display: block; }
  .content { padding: 0; max-width: 100%; }
  .theme-block { page-break-before: auto; break-before: auto; }
  .theme-block + .theme-block { border-top: 1px solid #999; page-break-before: always; break-before: page; }
  h2.theme-title { color: black; page-break-after: avoid; }
  h3.stage { color: black !important; border-color: #999 !important; page-break-after: avoid; }
  pre, code { background: #f4f4f4 !important; color: black !important; border: 1px solid #ccc !important; -webkit-print-color-adjust: exact; }
  pre { white-space: pre-wrap; word-break: break-word; }
  table, th, td { border-color: #999 !important; color: black !important; }
  th { background: #eee !important; color: black !important; }
  .callout { border: 1px solid #999 !important; background: #f8f8f8 !important; color: black !important; }
  .callout.warn { background: #fffbe6 !important; }
  blockquote { border-color: #999 !important; background: #f8f8f8 !important; color: #333 !important; }
  a { color: black; text-decoration: underline; }
  .anchor { display: none !important; }
}
</style>
</head>

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
  function renderInline(text) {
    let s = escapeHtml(text);
    s = s.replace(/`([^`]+)`/g, (_, c) => '<code>' + c + '</code>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
    return s;
  }
  function renderMarkdown(md) {
    if (!md) return '';
    const lines = md.replace(/\r\n/g, '\n').split('\n');
    const out = [];
    let i = 0;
    while (i < lines.length) {
      const line = lines[i];
      if (/^```/.test(line)) {
        const buf = [];
        i++;
        while (i < lines.length && !/^```/.test(lines[i])) { buf.push(lines[i]); i++; }
        i++;
        out.push('<pre><code>' + escapeHtml(buf.join('\n')) + '</code></pre>');
        continue;
      }
      if (/^---\s*$/.test(line)) { out.push('<hr>'); i++; continue; }
      let m;
      if ((m = /^####\s+(.*)$/.exec(line))) { out.push('<h4>' + renderInline(m[1]) + '</h4>'); i++; continue; }
      if ((m = /^###\s+(.*)$/.exec(line)))  { out.push('<h4>' + renderInline(m[1]) + '</h4>'); i++; continue; }
      if (/^>\s?/.test(line)) {
        const buf = [];
        while (i < lines.length && /^>\s?/.test(lines[i])) { buf.push(lines[i].replace(/^>\s?/, '')); i++; }
        out.push('<blockquote>' + renderInline(buf.join(' ')) + '</blockquote>');
        continue;
      }
      if (/^\|.*\|$/.test(line) && i + 1 < lines.length && /^\|[\s:\-|]+\|$/.test(lines[i + 1])) {
        const header = line.split('|').slice(1, -1).map(s => s.trim());
        i += 2;
        const rows = [];
        while (i < lines.length && /^\|.*\|$/.test(lines[i])) {
          rows.push(lines[i].split('|').slice(1, -1).map(s => s.trim()));
          i++;
        }
        let html = '<table><thead><tr>';
        header.forEach(h => html += '<th>' + renderInline(h) + '</th>');
        html += '</tr></thead><tbody>';
        rows.forEach(r => {
          html += '<tr>';
          r.forEach(c => html += '<td>' + renderInline(c) + '</td>');
          html += '</tr>';
        });
        html += '</tbody></table>';
        out.push(html);
        continue;
      }
      if (/^[-*]\s+/.test(line)) {
        const buf = [];
        while (i < lines.length && /^[-*]\s+/.test(lines[i])) { buf.push(lines[i].replace(/^[-*]\s+/, '')); i++; }
        out.push('<ul>' + buf.map(t => '<li>' + renderInline(t) + '</li>').join('') + '</ul>');
        continue;
      }
      if (/^\d+\.\s+/.test(line)) {
        const buf = [];
        while (i < lines.length && /^\d+\.\s+/.test(lines[i])) { buf.push(lines[i].replace(/^\d+\.\s+/, '')); i++; }
        out.push('<ol>' + buf.map(t => '<li>' + renderInline(t) + '</li>').join('') + '</ol>');
        continue;
      }
      if (/^\s*$/.test(line)) { i++; continue; }
      const buf = [];
      while (i < lines.length && !/^\s*$/.test(lines[i]) && !/^```/.test(lines[i]) && !/^#{3,4}\s+/.test(lines[i]) && !/^[-*]\s+/.test(lines[i]) && !/^\d+\.\s+/.test(lines[i]) && !/^>\s?/.test(lines[i]) && !(/^\|.*\|$/.test(lines[i]) && i + 1 < lines.length && /^\|[\s:\-|]+\|$/.test(lines[i + 1]))) {
        buf.push(lines[i]); i++;
      }
      out.push('<p>' + renderInline(buf.join(' ')) + '</p>');
    }
    return out.join('\n');
  }

  // ---- Section renderers ---------------------------------------
  const SECTION_RENDERERS = {
    md(sec) {
      const body = renderMarkdown(sec.body || '');
      return sec.title ? ('<h4>' + escapeHtml(sec.title) + '</h4>' + body) : body;
    },
    quote(sec) {
      return '<blockquote>' + renderInline(sec.text || '') + '</blockquote>';
    },
    kv(sec) {
      const items = (sec.items || []).map(pair => {
        const [k, v] = pair;
        return '<div class="k">' + escapeHtml(k) + '</div><div class="v">' + renderInline(v) + '</div>';
      }).join('');
      return (sec.title ? '<h4>' + escapeHtml(sec.title) + '</h4>' : '') + '<div class="kv">' + items + '</div>';
    },
    table(sec) {
      const head = (sec.header || []).map(h => '<th>' + renderInline(h) + '</th>').join('');
      const rows = (sec.rows || []).map(r => '<tr>' + r.map(c => '<td>' + renderInline(c) + '</td>').join('') + '</tr>').join('');
      return (sec.title ? '<h4>' + escapeHtml(sec.title) + '</h4>' : '') +
        '<table><thead><tr>' + head + '</tr></thead><tbody>' + rows + '</tbody></table>';
    },
    code(sec) {
      return (sec.title ? '<h4>' + escapeHtml(sec.title) + '</h4>' : '') +
        '<pre><code>' + escapeHtml(sec.body || '') + '</code></pre>';
    },
    ascii(sec) {
      return (sec.title ? '<h4>' + escapeHtml(sec.title) + '</h4>' : '') +
        '<div class="ascii">' + escapeHtml(sec.body || '') + '</div>';
    },
    callout(sec) {
      const variant = sec.variant || 'info';
      return '<div class="callout ' + escapeHtml(variant) + '">' +
        (sec.title ? '<div class="title">' + escapeHtml(sec.title) + '</div>' : '') +
        (sec.body ? renderMarkdown(sec.body) : '') +
        '</div>';
    },
  };
  function renderSection(sec) {
    const r = SECTION_RENDERERS[sec.kind];
    if (!r) {
      console.warn('[guide] unknown section kind:', sec.kind, sec);
      return '<p>' + renderInline((sec.body || sec.text || JSON.stringify(sec))) + '</p>';
    }
    return r(sec);
  }

  // ---- Theme block rendering (documentation style) --------------
  function renderThemeBlock(theme, opts) {
    opts = opts || {};
    let html = '';
    html += '<section class="theme-block" id="' + escapeHtml(theme.id) + '">';
    html += '<h2 class="theme-title" id="theme-' + escapeHtml(theme.id) + '"><a class="anchor" href="#' + escapeHtml(theme.id) + '">§</a>' + escapeHtml(theme.icon || '') + ' ' + escapeHtml(theme.title || '') + '</h2>';
    if (theme.tagline) html += '<div class="tagline">' + renderInline(theme.tagline) + '</div>';
    if (theme.hero) {
      html += (Array.isArray(theme.hero) ? theme.hero : [theme.hero]).map(renderSection).join('\n');
    }
    STAGES.forEach(stage => {
      const secs = (theme.stages && theme.stages[stage.key]) || [];
      const bodyHtml = secs.length
        ? secs.map(renderSection).join('\n')
        : '<p><em>待补充</em></p>';
      html += '<h3 class="stage" data-stage="' + stage.key + '" id="' + escapeHtml(theme.id) + '__' + stage.key + '"><a class="anchor" href="#' + escapeHtml(theme.id) + '__' + stage.key + '">§</a>' + escapeHtml(stage.label) + '</h3>';
      html += bodyHtml;
    });
    if (theme.sources && theme.sources.length) {
      html += '<h3 class="stage" data-stage="sources" id="' + escapeHtml(theme.id) + '__sources">内容来源</h3>';
      html += '<ul>' + theme.sources.map(s => '<li>' + renderInline(s) + '</li>').join('') + '</ul>';
    }
    html += '</section>';
    return html;
  }

  function renderSidebar(themes) {
    let html = '';
    html += '<div class="brand">📖 面试复习中心<small>9 年后台 · 7 大专题</small></div>';
    html += '<h2>专题</h2><ul>';
    themes.forEach(t => {
      html += '<li><a href="#' + escapeHtml(t.id) + '" data-nav="' + escapeHtml(t.id) + '">' + escapeHtml(t.icon || '') + ' ' + escapeHtml(t.title) + '</a></li>';
      html += '<li class="sub"><a href="#' + escapeHtml(t.id) + '__what-is">是什么</a></li>';
      html += '<li class="sub"><a href="#' + escapeHtml(t.id) + '__why-choose">为什么这么选</a></li>';
      html += '<li class="sub"><a href="#' + escapeHtml(t.id) + '__what-broke">踩过什么坑</a></li>';
      html += '<li class="sub"><a href="#' + escapeHtml(t.id) + '__how-fixed">怎么填的</a></li>';
    });
    html += '</ul>';
    html += '<div class="tools">';
    html += '<button id="btn-theme" title="亮/暗主题">☾ 主题</button>';
    html += '<button onclick="window.print()" title="打印">🖨 打印</button>';
    html += '</div>';
    return html;
  }

  function renderSidebarSingle(theme) {
    let html = '';
    html += '<div class="brand">📖 ' + escapeHtml(theme.title) + '<small>面试复习分册</small></div>';
    html += '<h2>目录</h2><ul>';
    html += '<li><a href="#' + escapeHtml(theme.id) + '__what-is">① 是什么</a></li>';
    html += '<li><a href="#' + escapeHtml(theme.id) + '__why-choose">② 为什么这么选</a></li>';
    html += '<li><a href="#' + escapeHtml(theme.id) + '__what-broke">③ 踩过什么坑</a></li>';
    html += '<li><a href="#' + escapeHtml(theme.id) + '__how-fixed">④ 怎么填的</a></li>';
    if (theme.sources && theme.sources.length) {
      html += '<li><a href="#' + escapeHtml(theme.id) + '__sources">📎 内容来源</a></li>';
    }
    html += '</ul>';
    html += '<div class="tools">';
    html += '<button id="btn-theme" title="亮/暗主题">☾ 主题</button>';
    html += '<button onclick="window.print()" title="打印">🖨 打印</button>';
    html += '<a href="index.html">← 返回首页</a>';
    html += '</div>';
    return html;
  }

  function bindThemeToggle() {
    const btn = document.getElementById('btn-theme');
    if (!btn) return;
    let stored = null;
    try { stored = localStorage.getItem('guide-theme'); } catch (_) {}
    if (stored) document.documentElement.setAttribute('data-theme', stored);
    btn.addEventListener('click', () => {
      const cur = document.documentElement.getAttribute('data-theme') === 'dark' ? '' : 'dark';
      if (cur) document.documentElement.setAttribute('data-theme', cur);
      else document.documentElement.removeAttribute('data-theme');
      try { localStorage.setItem('guide-theme', cur); } catch (_) {}
    });
  }

  function bindMobileMenu() {
    const btn = document.getElementById('menu-btn');
    const sidebar = document.getElementById('sidebar');
    if (!btn || !sidebar) return;
    btn.addEventListener('click', () => sidebar.classList.toggle('open'));
    sidebar.addEventListener('click', (e) => {
      if (e.target.tagName === 'A') sidebar.classList.remove('open');
    });
  }

  function bindScrollSpy(themes) {
    const links = document.querySelectorAll('.sidebar a[data-nav]');
    if (!links.length) return;
    const map = {};
    themes.forEach(t => {
      const el = document.getElementById(t.id);
      if (el) map[t.id] = el;
    });
    function onScroll() {
      const y = window.scrollY + 100;
      let active = themes[0] && themes[0].id;
      themes.forEach(t => {
        const el = map[t.id];
        if (el && el.offsetTop <= y) active = t.id;
      });
      links.forEach(a => a.classList.toggle('active', a.dataset.nav === active));
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  }

  // ---- Boot -----------------------------------------------------
  function bootHub() {
    const themes = window.__GUIDE_THEMES__ || [];
    const sidebar = document.getElementById('sidebar');
    const content = document.getElementById('content');
    if (!sidebar || !content) return;

    sidebar.innerHTML = renderSidebar(themes);
    let contentHtml = '';
    contentHtml += '<h1 class="doc-title">面试复习中心</h1>';
    contentHtml += '<p class="doc-lede">9 年后台开发（3 年互联网 + 6 年游戏）· 7 大专题按 <strong>是什么 → 为什么这么选 → 踩过什么坑 → 怎么填的</strong> 四段式组织。侧边栏可跳转，或直接向下滚动阅读。</p>';
    themes.forEach(t => contentHtml += renderThemeBlock(t));
    contentHtml += '<div class="footer-note" id="footer-note"></div>';
    content.innerHTML = contentHtml;

    const footer = document.getElementById('footer-note');
    if (footer) footer.innerHTML = (window.__GUIDE_META__ && window.__GUIDE_META__.footerNote) || '';

    bindThemeToggle();
    bindMobileMenu();
    bindScrollSpy(themes);
  }

  function bootSingle() {
    const theme = window.__GUIDE_THEME__;
    if (!theme) return;
    const sidebar = document.getElementById('sidebar');
    const content = document.getElementById('content');
    if (!sidebar || !content) return;

    sidebar.innerHTML = renderSidebarSingle(theme);
    let contentHtml = '';
    contentHtml += '<h1 class="doc-title">' + escapeHtml(theme.icon || '') + ' ' + escapeHtml(theme.title) + '</h1>';
    if (theme.tagline) contentHtml += '<p class="doc-lede">' + renderInline(theme.tagline) + '</p>';
    // For single view, render without the theme wrapper (theme title is the doc title)
    if (theme.hero) {
      contentHtml += (Array.isArray(theme.hero) ? theme.hero : [theme.hero]).map(renderSection).join('\n');
    }
    STAGES.forEach(stage => {
      const secs = (theme.stages && theme.stages[stage.key]) || [];
      const bodyHtml = secs.length ? secs.map(renderSection).join('\n') : '<p><em>待补充</em></p>';
      contentHtml += '<h3 class="stage" data-stage="' + stage.key + '" id="' + escapeHtml(theme.id) + '__' + stage.key + '"><a class="anchor" href="#' + escapeHtml(theme.id) + '__' + stage.key + '">§</a>' + escapeHtml(stage.label) + '</h3>';
      contentHtml += bodyHtml;
    });
    if (theme.sources && theme.sources.length) {
      contentHtml += '<h3 class="stage" data-stage="sources" id="' + escapeHtml(theme.id) + '__sources">内容来源</h3>';
      contentHtml += '<ul>' + theme.sources.map(s => '<li>' + renderInline(s) + '</li>').join('') + '</ul>';
    }
    contentHtml += '<div class="footer-note" id="footer-note"></div>';
    content.innerHTML = contentHtml;

    const footer = document.getElementById('footer-note');
    if (footer) footer.innerHTML = (window.__GUIDE_META__ && window.__GUIDE_META__.footerNote) || '';

    bindThemeToggle();
    bindMobileMenu();
  }

  function boot() {
    if (window.__GUIDE_MODE__ === 'hub') bootHub();
    else if (window.__GUIDE_MODE__ === 'single') bootSingle();
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();

  window.__GUIDE_API__ = { renderMarkdown, renderSection, renderThemeBlock };
})();
</script>
</body>
